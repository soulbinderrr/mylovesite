<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Соня + Вова ❤️</title>
    <style>
        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffb3c6 100%);
            color: #4a1525;
            font-family: 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(255, 75, 110, 0.2);
            backdrop-filter: blur(10px);
            max-width: 90%;
            width: 350px;
        }
        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #ff477e;
        }
        .names {
            font-size: 24px;
            font-weight: bold;
            margin: 15px 0;
            letter-spacing: 1px;
        }
        .heart-main {
            font-size: 50px;
            animation: heartbeat 1.2s infinite;
            margin: 15px 0;
            display: inline-block;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.1); }
            40% { transform: scale(1.05); }
            60% { transform: scale(1.15); }
            80% { transform: scale(1); }
            100% { transform: scale(1); }
        }
        .counter {
            font-size: 20px;
            background: #ff758f;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            display: inline-block;
            margin: 15px 0;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 117, 143, 0.3);
        }
        p {
            font-size: 16px;
            line-height: 1.5;
            color: #5c2c3a;
        }
        .btn {
            background: #ff477e;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(255, 71, 126, 0.4);
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>С годовщиной, любимая! ✨</h1>
        
        <div class="names">Вова ❤️ Соня</div>
        
        <div class="heart-main">💖</div>
        
        <p>Мы счастливы вместе уже:</p>
        <div class="counter" id="days-count">0 дней</div>
        
        <p>Спасибо за каждый день, твою улыбку и твою любовь. Ты моё самое лучшее приключение! Нажми на кнопку ниже 👇</p>
        
        <button class="btn" onclick="sayLove()">Нажми меня</button>
    </div>

    <script>
        // Дата вашей годовщины: 13 июля 2025 года (июль в JS — это 6)
        const startDate = new Date(2025, 6, 13); 
        
        function updateCounter() {
            const today = new Date();
            const difference = today - startDate;
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            
            // Если дата ещё не наступила в будущем (на всякий случай)
            if (days < 0) {
                document.getElementById('days-count').innerText = 'Скоро всё начнется!';
            } else {
                document.getElementById('days-count').innerText = days + ' ' + getDaysWord(days);
            }
        }
        
        function getDaysWord(number) {
            const lastDigit = number % 10;
            const lastTwoDigits = number % 100;
            if (lastTwoDigits >= 11 && lastTwoDigits <= 19) return 'дней';
            if (lastDigit === 1) return 'день';
            if (lastDigit >= 2 && lastDigit <= 4) return 'дня';
            return 'дней';
        }

        function sayLove() {
            alert('Соня, я тебя безумно сильно люблю! Ты самый сладенький котеночек на свете!);
        }

        updateCounter();
    </script>
</body>
</html>
