<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Соня + Вова</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            background: #f5f5f5;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('6.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(1px) contrast(100%);
            z-index: -1;
        }

        /* Панель навигации */
        .nav-bar {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            padding: 8px 12px;
            border-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .nav-btn {
            border: none;
            background: transparent;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            color: #555;
            transition: 0.2s;
            white-space: nowrap;
            min-width: 90px;
            text-align: center;
        }

        .nav-btn.active {
            background: #ff4d6d;
            color: white;
        }

        .nav-btn:hover:not(.active) {
            background: rgba(255, 77, 109, 0.15);
            color: #ff4d6d;
        }

        .screen {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            padding: 25px 20px;
            border-radius: 28px;
            width: 90%;
            max-width: 300px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: absolute;
            z-index: 1;
            opacity: 0;
            visibility: hidden;
            transform: translateY(15px);
            transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s ease;
        }

        .active {
            position: relative;
            opacity: 0.95;
            visibility: visible;
            transform: translateY(0);
        }

.names {
    font-size: 2rem;
    font-weight: 700;
    color: #ff4d6d;
    margin-bottom: 12px;
    margin-top: 15px;       /* 👈 добавь */
    cursor: pointer;
}

.days-number {
    font-size: 3.5rem;
    font-weight: bold;
    color: #ff4d6d;
    margin-top: 5px;        /* 👈 добавь */
}

        .days-label {
            color: #555;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        /* Обёртка для плавного перехода картинок */
        .main-image-wrapper {
            position: relative;
            width: 100%;
            max-width: 220px;
            height: 220px;
            margin: 0 auto;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
        }

        .main-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 20px;
            transition: opacity 0.8s ease;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
-webkit -user -drag: none;
-webkit-user-select: none;
- mOz-user-select: none;
-user-se.lect: none;
user-select: none;
pointer-events: auto;
        }

        .main-image.top {
            opacity: 0;
        }

        /* Облачко с комплиментом */
        .compliment-cloud {
            position: fixed;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #ff4d6d;
            font-weight: 600;
            pointer-events: none;
            z-index: 999;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.2);
            border: 1px solid rgba(255, 77, 109, 0.2);
            animation: cloudFloat 3.5s ease-out forwards;
            text-align: center;
            max-width: 180px;
            left: 0;
            top: 0;
        }

        .compliment-cloud::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid rgba(255, 255, 255, 0.95);
        }

        @keyframes cloudFloat {
            0% {
                opacity: 0;
                transform: translateY(15px) scale(0.7);
            }
            20% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            70% {
                opacity: 1;
                transform: translateY(-50px) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-90px) scale(0.85);
            }
        }

        h2 {
            font-family: 'Dancing Script', cursive;
            color: #ff4d6d;
            margin-bottom: 12px;
        }

        .screen p {
            color: #555;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .btn {
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.2s;
            color: white;
        }
        .btn:active { transform: scale(0.95); }
        .btn-back { background: #e0e0e0; color: #555; margin-top: 15px; }

        .photo-strip {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            margin-top: 15px;
            padding-bottom: 10px;
        }

        .photo-strip img {
            height: 180px;
            border-radius: 15px;
            flex-shrink: 0;
            border: 2px solid white;
            cursor: pointer;
            transition: 0.2s;
        }

        .photo-strip img:hover {
            transform: scale(1.03);
            border-color: #ff4d6d;
        }

        /* Заглушка загрузки фото */
        .photo-loading {
            height: 180px;
            min-width: 130px;
            border-radius: 15px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,77,109,0.2);
            border-top-color: #ff4d6d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .photo-strip img.loaded {
            animation: fadeInPhoto 0.4s ease;
        }

        @keyframes fadeInPhoto {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Лайтбокс */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            backdrop-filter: blur(5px);
        }

        .lightbox.active { display: flex; }

        .lightbox img {
            max-width: 85%;
            max-height: 85vh;
            border-radius: 20px;
            border: 3px solid white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: zoomIn 0.3s ease-out;
            user-select: none;
            -webkit-user-drag: none;
        }

        .lightbox-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 10001;
            transition: 0.2s;
            padding: 15px;
            user-select: none;
        }

        .lightbox-arrow:hover { color: #ff4d6d; transform: translateY(-50%) scale(1.2); }
        .lightbox-prev { left: 10px; }
        .lightbox-next { right: 10px; }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 25px;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 10001;
            transition: 0.2s;
        }

        .lightbox-close:hover { transform: scale(1.2); color: #ff4d6d; }

        .lightbox-counter {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            z-index: 10001;
        }

        @keyframes zoomIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Сердечки по клику */
        .heart {
            position: fixed;
            color: #ff4d6d;
            pointer-events: none;
            font-size: 20px;
            z-index: 9999;
            animation: moveHeart 1s ease-out forwards;
            text-shadow: 0 0 5px rgba(255, 77, 109, 0.5);
        }

        @keyframes moveHeart {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-200px) scale(0.5) rotate(calc(var(--rot) * 1deg)); opacity: 0; }
        }

        /* Дождь из сердечек */
        .rain-heart {
            position: fixed;
            top: -40px;
            color: #ff4d6d;
            pointer-events: none;
            z-index: 2;
            animation: rainFall linear infinite;
            opacity: 0.3;
            font-size: 16px;
        }

        @keyframes rainFall {
            0% { transform: translateY(-5vh) rotate(0deg); opacity: 0.35; }
            80% { opacity: 0.3; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* Горизонтальная ориентация */
        @media (orientation: landscape) {
            .screen {
                margin-top: 70px;
            }
        }
    </style>
</head>
<body>

    <!-- Панель вкладок -->
    <div class="nav-bar">
        <button class="nav-btn active" data-screen="screen-main">Главная</button>
        <button class="nav-btn" data-screen="screen-history">❤️</button>
        <button class="nav-btn" data-screen="screen-photos">Фото</button>
    </div>

    <!-- Лайтбокс -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <span class="lightbox-arrow lightbox-prev" onclick="changePhoto(-1)">&#8249;</span>
        <span class="lightbox-arrow lightbox-next" onclick="changePhoto(1)">&#8250;</span>
        <img src="" alt="Фото" id="lightbox-img">
        <div class="lightbox-counter" id="lightbox-counter"></div>
    </div>

    <!-- Главный экран -->
    <div id="screen-main" class="screen active">
        <div class="names" onclick="toggleNames()" id="pair-names">Соня + Вова</div>
        <div class="days-number" id="counter">0</div>
        <div class="days-label">дней вместе</div>

        <div class="main-image-wrapper" id="main-image-wrapper">
            <img src="7.png" alt="Соня и Вова" class="main-image bottom" id="main-image-bottom">
            <!-- ЗАМЕНИ 8.png НА ИМЯ ВТОРОЙ PNG -->
            <img src="9.png" alt="Соня и Вова" class="main-image top" id="main-image-top">
        </div>
    </div>

    <!-- Экран истории -->
    <div id="screen-history" class="screen">
        <h2>Напоминание ❤️</h2>
        <p>Соня, я люблю тебя и дорожу нашими отношениями. Ты лучшее, что есть в моей жизни, самое яркое солнышко, самый милый котёнок</p>
        <button class="btn btn-back" onclick="showScreen('screen-main')">← На главную</button>
    </div>

    <!-- Экран фото -->
    <div id="screen-photos" class="screen">
        <h2>Наши моменты</h2>
        <div class="photo-strip" id="photo-strip">
            <div class="photo-loading" data-src="1.jpg"><div class="spinner"></div></div>
            <div class="photo-loading" data-src="2.jpg"><div class="spinner"></div></div>
            <div class="photo-loading" data-src="3.jpg"><div class="spinner"></div></div>
            <div class="photo-loading" data-src="4.jpg"><div class="spinner"></div></div>
            <div class="photo-loading" data-src="5.jpg"><div class="spinner"></div></div>
        </div>
        <button class="btn btn-back" onclick="showScreen('screen-main')">← На главную</button>
    </div>

    <script>
        // === НАВИГАЦИЯ ПО ВКЛАДКАМ ===
        const navButtons = document.querySelectorAll('.nav-btn');
        navButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const screenId = btn.getAttribute('data-screen');
                showScreen(screenId);
            });
        });

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            setTimeout(() => {
                const screen = document.getElementById(id);
                screen.classList.add('active');

                navButtons.forEach(b => {
                    b.classList.remove('active');
                    if (b.getAttribute('data-screen') === 'screen-history') {
                        b.innerHTML = '❤️';
                    }
                    if (b.getAttribute('data-screen') === 'screen-photos') {
                        b.innerHTML = '📷 Фото';
                    }
                    if (b.getAttribute('data-screen') === id) {
                        b.classList.add('active');
                        if (id === 'screen-history') {
                            b.innerHTML = '🤍';
                        }
                    }
                });
            }, 0);
        }

        // Переключение имён
        const namesElem = document.getElementById('pair-names');
        function toggleNames() {
            namesElem.innerText = (namesElem.innerText === "Соня + Вова") ? "Софийко + Вова" : "Соня + Вова";
        }

        // Счётчик дней
        const days = Math.floor((new Date() - new Date(2025, 6, 13)) / (1000 * 60 * 60 * 24));
        document.getElementById('counter').innerText = days;

        // === КОМПЛИМЕНТЫ ===
        const compliments = [
            "Ты — моё солнышко ☀️",
            "Ты самый прелестный котёночек ✨",
            "С тобой я счастлив 💕",
            "Ты самая красивая 🌸",
            "Ты — лучшее в моей жизни 🍀",
            "С тобой мне хорошо 🥰",
            "Хочу быть рядом 🥹",
            "Спасибо, что ты есть 💖",
            "Ты — моя самая милая 🐱",
            "Я по тебе скучаю 🥹"
        ];

        function getRandomCompliment() {
            return compliments[Math.floor(Math.random() * compliments.length)];
        }

        function showComplimentCloud(wrapperRect) {
            const cloud = document.createElement('div');
            cloud.className = 'compliment-cloud';
            cloud.innerText = getRandomCompliment();

            // Облачко в пределах картинки
            const cloudWidth = 160;
            const cloudHeight = 60;
            const minX = wrapperRect.left;
            const maxX = wrapperRect.right - cloudWidth;
            const minY = wrapperRect.top - 20;
            const maxY = wrapperRect.bottom - cloudHeight - 20;

            const randomX = Math.max(minX, Math.min(maxX, minX + Math.random() * (maxX - minX)));
            const randomY = Math.max(minY, Math.min(maxY, minY + Math.random() * (maxY - minY)));

            cloud.style.left = randomX + 'px';
            cloud.style.top = randomY + 'px';

            document.body.appendChild(cloud);
            cloud.addEventListener('animationend', () => cloud.remove());
        }

        // === ПЕРЕКЛЮЧЕНИЕ ГЛАВНОЙ КАРТИНКИ (один раз) ===
        const imgTop = document.getElementById('main-image-top');
        const wrapper = document.getElementById('main-image-wrapper');
        // Запрет контекстного меню на картинке
wrapper.addEventListener('contextmenu', (e) => {
    e.preventDefault();
});
        let hasSwitched = false;

        wrapper.addEventListener('click', () => {
            const rect = wrapper.getBoundingClientRect();
            showComplimentCloud(rect);

            if (!hasSwitched) {
                imgTop.style.opacity = '1';
                hasSwitched = true;
            }
        });

        // === ЛАЙТБОКС ===
        let currentPhotoIndex = 0;
        let photosArray = [];

        function updatePhotosArray() {
            photosArray = Array.from(document.querySelectorAll('#photo-strip img'));
        }

        document.querySelectorAll('.photo-loading').forEach(placeholder => {
            const src = placeholder.getAttribute('data-src');
            const img = new Image();
            img.onload = () => {
                const newImg = document.createElement('img');
                newImg.className = 'loaded';
                newImg.src = src;
                newImg.alt = src;
                placeholder.replaceWith(newImg);
                updatePhotosArray();
                newImg.addEventListener('click', () => {
                    const index = photosArray.indexOf(newImg);
                    if (index >= 0) openLightbox(index);
                });
            };
            img.onerror = () => {
                placeholder.innerHTML = '❌';
            };
            img.src = src;
        });

        function openLightbox(index) {
            currentPhotoIndex = index;
            updateLightboxImage();
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function changePhoto(direction) {
            currentPhotoIndex += direction;
            if (currentPhotoIndex < 0) currentPhotoIndex = photosArray.length - 1;
            if (currentPhotoIndex >= photosArray.length) currentPhotoIndex = 0;
            updateLightboxImage();
        }

        function updateLightboxImage() {
            const img = document.getElementById('lightbox-img');
            const counter = document.getElementById('lightbox-counter');
            img.src = photosArray[currentPhotoIndex].src;
            img.style.animation = 'none';
            img.offsetHeight;
            img.style.animation = 'zoomIn 0.3s ease-out';
            counter.innerText = `${currentPhotoIndex + 1} / ${photosArray.length}`;
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });

        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') changePhoto(-1);
            if (e.key === 'ArrowRight') changePhoto(1);
        });

        let touchStartX = 0;
        let touchEndX = 0;
        document.getElementById('lightbox').addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});
        document.getElementById('lightbox').addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) changePhoto(diff > 0 ? 1 : -1);
        });

        // === СЕРДЕЧКИ ===
        function createHeartElement(className, styles = {}) {
            const heart = document.createElement('div');
            heart.className = className;
            heart.innerHTML = '❤';
            Object.assign(heart.style, styles);
            document.body.appendChild(heart);
            return heart;
        }

        function createRainHeart() {
            const heart = createHeartElement('rain-heart', {
                left: Math.random() * 100 + '%',
                fontSize: (Math.random() * 12 + 12) + 'px',
                animationDuration: (Math.random() * 8 + 12) + 's',
                animationDelay: Math.random() * 10 + 's',
                opacity: Math.random() * 0.2 + 0.15
            });
            heart.addEventListener('animationend', () => heart.remove());
        }

        for (let i = 0; i < 8; i++) {
            setTimeout(() => createRainHeart(), Math.random() * 8000);
        }
        setInterval(() => {
            if (document.querySelectorAll('.rain-heart').length < 12) {
                createRainHeart();
            }
        }, 3000);

        document.addEventListener('click', (e) => {
            if (e.target.closest('.nav-btn') || e.target.closest('.lightbox') || e.target.closest('#photo-strip') || e.target.closest('#main-image-wrapper')) return;
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const heart = createHeartElement('heart', {
                        '--rot': (Math.random() - 0.5) * 100,
                        left: (e.clientX + (Math.random() * 40 - 20)) + 'px',
                        top: (e.clientY - 20) + 'px'
                    });
                    heart.addEventListener('animationend', () => heart.remove());
                }, i * 50);
            }
        });
    </script>
</body>
</html>
