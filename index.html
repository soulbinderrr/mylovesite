<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Соня + Вова</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Фон */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('bg.jpg'); background-size: cover; background-position: center; filter: blur(8px) contrast(80%); z-index: -1; }

        /* Экраны */
        .screen { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); padding: 30px; border-radius: 28px; width: 85%; max-width: 320px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.3); display: none; }
        .active { display: block; }

        /* Элементы */
        .names { font-size: 1.6rem; font-weight: 700; color: #ff4d6d; margin-bottom: 15px; cursor: pointer; }
        .days-number { font-size: 4rem; font-weight: bold; color: #ff4d6d; }
        
        .btn { border: none; padding: 12px; border-radius: 50px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; color: white; }
        .btn:active { transform: scale(0.95); }
        .btn-red { background: linear-gradient(135deg, #ff4d6d, #ff758c); }
        .btn-back { background: #e0e0e0; color: #555; margin-top: 20px; }

        /* Фото-полоса */
        .photo-strip { display: flex; overflow-x: auto; gap: 10px; margin-top: 20px; padding-bottom: 10px; }
        .photo-strip img { height: 200px; border-radius: 15px; flex-shrink: 0; border: 2px solid white; cursor: pointer; transition: 0.2s; }
        .photo-strip img:hover { transform: scale(1.03); border-color: #ff4d6d; }

        /* Лайтбокс */
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 10000; backdrop-filter: blur(5px); }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 80%; max-height: 85vh; border-radius: 20px; border: 3px solid white; box-shadow: 0 10px 40px rgba(0,0,0,0.5); animation: zoomIn 0.3s ease-out; user-select: none; -webkit-user-drag: none; }
        
        /* Стрелки */
        .lightbox-arrow { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 3rem; cursor: pointer; z-index: 10001; transition: 0.2s; padding: 20px; user-select: none; }
        .lightbox-arrow:hover { color: #ff4d6d; transform: translateY(-50%) scale(1.2); }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }
        
        .lightbox-close { position: absolute; top: 25px; right: 30px; color: white; font-size: 2.5rem; cursor: pointer; z-index: 10001; transition: 0.2s; }
        .lightbox-close:hover { transform: scale(1.2); color: #ff4d6d; }
        
        /* Счётчик фото */
        .lightbox-counter { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.7); font-size: 0.9rem; z-index: 10001; }

        @keyframes zoomIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Сердечки */
        .heart { position: fixed; color: #ff4d6d; pointer-events: none; font-size: 20px; z-index: 9999; animation: moveHeart 1s ease-out forwards; text-shadow: 0 0 5px rgba(255, 77, 109, 0.5); }
        @keyframes moveHeart {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-200px) scale(0.5) rotate(calc(var(--rot) * 1deg)); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Лайтбокс для просмотра фото -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <span class="lightbox-arrow lightbox-prev" onclick="changePhoto(-1)">&#8249;</span>
        <span class="lightbox-arrow lightbox-next" onclick="changePhoto(1)">&#8250;</span>
        <img src="" alt="Фото" id="lightbox-img">
        <div class="lightbox-counter" id="lightbox-counter"></div>
    </div>

    <div id="screen-main" class="screen active">
        <div class="names" onclick="toggleNames()" id="pair-names">Соня + Вова</div>
        <div class="days-number" id="counter">0</div>
        <div style="margin-bottom: 20px; color: #555;">дней вместе</div>
        
        <button class="btn btn-red" onclick="showScreen('screen-history')">📖 История</button>
        <button class="btn btn-red" onclick="showScreen('screen-photos')">📷 Фото</button>
    </div>

    <div id="screen-history" class="screen">
        <h2 style="font-family:'Dancing Script'; color: #ff4d6d;">Наша история</h2>
        <p>Я люблю тебя, солнце <3</p>
        <button class="btn btn-back" onclick="showScreen('screen-main')">Назад</button>
    </div>

    <div id="screen-photos" class="screen">
        <h2 style="font-family:'Dancing Script'; color: #ff4d6d;">Наши моменты</h2>
        <div class="photo-strip" id="photo-strip">
            <img src="1.jpg" alt="1">
            <img src="2.jpg" alt="2">
            <img src="3.jpg" alt="3">
            <img src="4.jpg" alt="4">
            <img src="5.jpg" alt="5">
        </div>
        <button class="btn btn-back" onclick="showScreen('screen-main')">Назад</button>
    </div>

    <script>
        // Переключение экранов
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Переключение имён
        const namesElem = document.getElementById('pair-names');
        function toggleNames() {
            namesElem.innerText = (namesElem.innerText === "Соня + Вова") ? "Софийко + Вова" : "Соня + Вова";
        }

        // Счётчик дней
        const days = Math.floor((new Date() - new Date(2025, 6, 13)) / (1000 * 60 * 60 * 24));
        document.getElementById('counter').innerText = days;

        // === ЛАЙТБОКС С ЛИСТАНИЕМ ===
        let currentPhotoIndex = 0;
        let photosArray = [];

        // Собираем все фото при загрузке
        function updatePhotosArray() {
            photosArray = Array.from(document.querySelectorAll('#photo-strip img'));
        }
        updatePhotosArray();

        // Присваиваем клики на фото
        document.querySelectorAll('#photo-strip img').forEach((img, index) => {
            img.addEventListener('click', () => openLightbox(index));
        });

        function openLightbox(index) {
            currentPhotoIndex = index;
            updateLightboxImage();
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function changePhoto(direction) {
            currentPhotoIndex += direction;
            // Зацикливание
            if (currentPhotoIndex < 0) currentPhotoIndex = photosArray.length - 1;
            if (currentPhotoIndex >= photosArray.length) currentPhotoIndex = 0;
            updateLightboxImage();
        }

        function updateLightboxImage() {
            const img = document.getElementById('lightbox-img');
            const counter = document.getElementById('lightbox-counter');
            img.src = photosArray[currentPhotoIndex].src;
            // Перезапуск анимации
            img.style.animation = 'none';
            img.offsetHeight;
            img.style.animation = 'zoomIn 0.3s ease-out';
            counter.innerText = `${currentPhotoIndex + 1} / ${photosArray.length}`;
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Закрытие по клику на фон
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });

        // Стрелки с клавиатуры и Escape
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') changePhoto(-1);
            if (e.key === 'ArrowRight') changePhoto(1);
        });

        // Свайпы на мобильных
        let touchStartX = 0;
        let touchEndX = 0;

        document.getElementById('lightbox').addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        document.getElementById('lightbox').addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                changePhoto(diff > 0 ? 1 : -1);
            }
        });

        // Эффект сердечек
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('btn') || e.target.closest('.lightbox') || e.target.closest('#photo-strip')) return;
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = '❤';
                    heart.style.setProperty('--rot', (Math.random() - 0.5) * 100);
                    heart.style.left = (e.clientX + (Math.random() * 40 - 20)) + 'px';
                    heart.style.top = (e.clientY - 20) + 'px';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 1000);
                }, i * 50);
            }
        });
    </script>
</body>
</html>
